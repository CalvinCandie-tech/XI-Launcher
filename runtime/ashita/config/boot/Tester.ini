[ashita.launcher]
autoclose    = 1
name         = Tester

[ashita.boot]
file         = C:\Users\Calvin Candie\xi-launcher\runtime\xiloader\\xiloader.exe
command      = --server 127.0.0.1
gamemodule   = ffximain.dll
script       = default.txt
args         =

[ashita.fonts]
d3d8.disable_scaling = 0
d3d8.family  = Arial
d3d8.height  = 10

[ashita.input]
gamepad.allowbackground       = 0
gamepad.disableenumeration    = 0
keyboard.blockinput           = 0
keyboard.blockbindsduringinput = 1
keyboard.silentbinds          = 0
keyboard.windowskeyenabled    = 0
mouse.blockinput              = 0
mouse.unhook                  = 1

[ashita.language]
playonline   = 2
ashita       = 2

[ashita.logging]
level        = 5
crashdumps   = 1

[ashita.misc]
addons.silent  = 0
aliases.silent = 0
plugins.silent = 0

[ashita.addons]
autojoin

[ashita.polplugins]

[ashita.polplugins.args]

[ashita.resources]
offsets.use_overrides   = 1
pointers.use_overrides  = 1
resources.use_overrides = 1

[ashita.taskpool]
threadcount  = -1

[ashita.window.startpos]
x            = -1
y            = -1

[ffxi.registry]
